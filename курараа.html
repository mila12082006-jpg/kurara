<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корпус песен «Курара»</title>
    <style>
        :root {
            --bg-main: #f0fdf4;
            --panel-bg: #ffffff;
            --border-color: #bbf7d0;
            --text-primary: #14532d;
            --text-secondary: #64748b;
            --accent-mint: #34d399;
            --accent-mint-hover: #10b981;
            --accent-mint-light: #d1fae5;
            --match-color: #be123c;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --radius: 12px;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }

        .site-header {
            background: #01532b;
            padding: 30px 20px 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .site-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.15) 0%, transparent 50%, rgba(0,0,0,0.1) 100%);
            pointer-events: none;
        }

        .logo-img {
            max-width: 500px;
            width: 80%;
            height: auto;
            display: block;
            margin: 0 auto 15px;
            filter: brightness(1.05);
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.02);
        }

        .header-subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 1rem;
            font-weight: 400;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        .status-bar {
            padding: 12px 16px;
            background: var(--accent-mint-light);
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            color: var(--text-primary);
            font-weight: 500;
            text-align: center;
            display: none;
        }

        .search-panel {
            background: var(--panel-bg);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .inputs-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .field label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .field input, .field select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            background: #f9fafb;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        .field input:focus, .field select:focus {
            outline: none;
            border-color: var(--accent-mint);
            background: #fff;
            box-shadow: 0 0 0 3px var(--accent-mint-light);
        }

        .grammar-toggle-btn {
            width: 100%;
            padding: 14px 18px;
            background: var(--accent-mint-light);
            border: 2px solid var(--accent-mint);
            border-radius: 8px;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            transition: all 0.2s;
        }

        .grammar-toggle-btn:hover {
            background: #b5ead7;
        }

        .grammar-toggle-btn.active {
            background: var(--accent-mint);
            color: white;
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            margin-bottom: 0;
            border-bottom-color: var(--accent-mint);
        }

        .grammar-options {
            display: none;
            background: var(--panel-bg);
            border: 2px solid var(--accent-mint);
            border-top: none;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
        }

        .grammar-options.show {
            display: block;
            animation: slideDown 0.25s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grammar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 25px;
        }

        .grammar-group h4 {
            margin: 0 0 10px 0;
            font-size: 0.8rem;
            color: var(--accent-mint-hover);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            margin-bottom: 6px;
            cursor: pointer;
            color: var(--text-primary);
            transition: color 0.1s;
        }

        .checkbox-label:hover {
            color: var(--accent-mint-hover);
        }

        .checkbox-label input {
            margin-right: 8px;
            accent-color: var(--accent-mint-hover);
            width: 16px;
            height: 16px;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 25px;
            justify-content: flex-end;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            transition: all 0.2s;
        }

        .btn-search {
            background: var(--accent-mint);
            color: white;
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
        }

        .btn-search:hover {
            background: var(--accent-mint-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(16, 185, 129, 0.3);
        }

        .btn-reset {
            background: #e2e8f0;
            color: #475569;
        }

        .btn-reset:hover {
            background: #cbd5e1;
        }

        .stats {
            margin-bottom: 15px;
            font-weight: 600;
            color: var(--text-primary);
            padding-left: 5px;
        }

        .results-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: var(--panel-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .results-table th {
            background: var(--accent-mint-light);
            color: var(--text-primary);
            padding: 14px 20px;
            text-align: left;
            font-weight: 700;
            border-bottom: 2px solid var(--border-color);
        }

        .results-table td {
            padding: 12px 20px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }

        .results-table tr:last-child td {
            border-bottom: none;
        }

        .results-table tr:hover {
            background: #f9fafb;
        }

        .context-cell {
            font-family: 'Georgia', serif;
            font-size: 1.05rem;
            color: #334155;
        }

        .match {
            font-weight: 900;
            color: var(--match-color);
            background: #fff1f2;
            padding: 1px 3px;
            border-radius: 4px;
        }

        .song-title {
            display: block;
            font-weight: 700;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .song-album {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            background: var(--panel-bg);
            border-radius: var(--radius);
            border: 2px dashed var(--border-color);
        }

        @media (max-width: 700px) {
            .inputs-row { grid-template-columns: 1fr; }
            .grammar-grid { grid-template-columns: 1fr 1fr; }
            .logo-img { width: 90%; }
        }
    </style>
</head>
<body>

<header class="site-header">
    <img src="logo.jpg" alt="КУРАРА" class="logo-img">
    <p class="header-subtitle">Поиск по корпусу песен</p>
</header>

<div class="container">

    <div class="status-bar" id="statusBar">⏳ Загрузка корпуса...</div>

    <div class="search-panel">
        <div class="inputs-row">
            <div class="field">
                <label>Словоформа</label>
                <input type="text" id="f_word" placeholder="например: фиплодня">
            </div>
            <div class="field">
                <label>Лемма</label>
                <input type="text" id="f_lemma" placeholder="например: фиплодень">
            </div>
        </div>

        <div class="field" style="margin-bottom: 20px;">
            <label>Альбом</label>
            <select id="album-select">
                <option value="">Все альбомы</option>
            </select>
        </div>

        <button class="grammar-toggle-btn" id="grammarToggle">
            <span>🔍 Грамматические признаки</span>
            <span id="arrow">▼</span>
        </button>

        <div class="grammar-options" id="grammarPanel">
            <div class="grammar-grid" id="grammarGrid"></div>
        </div>

        <div class="actions">
            <button class="btn btn-reset" id="btnReset">Сбросить</button>
            <button class="btn btn-search" id="btnSearch">Найти</button>
        </div>
    </div>

    <div id="resultsArea"></div>
</div>

<script>
    let corpus = [];
    let albumsList = new Set();

    const grammarColumns = [
        { index: 4, label: "Часть речи" },
        { index: 5, label: "Падеж" },
        { index: 6, label: "Число" },
        { index: 7, label: "Время" },
        { index: 8, label: "Лицо" },
        { index: 9, label: "Форма прилагательного" }
    ];

    fetch('songs_data.csv')
        .then(res => {
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res.text();
        })
        .then(csv => {
            parseCSV(csv);
            const bar = document.getElementById('statusBar');
            bar.style.display = 'block';
            bar.textContent = `✅ Корпус загружен: ${corpus.length} словоформ.`;
            bar.style.background = '#d1fae5';
            bar.style.color = '#064a38';
        })
        .catch(err => {
            const bar = document.getElementById('statusBar');
            bar.style.display = 'block';
            bar.innerHTML = `❌ Ошибка: ${err.message}. Убедитесь, что запущен локальный сервер.`;
            bar.style.background = '#fee2e2';
            bar.style.color = '#991b1b';
        });

    function parseCSV(text) {
        if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
        const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
        if (lines.length < 2) return;
        const linesData = lines.slice(1);
        linesData.forEach((line, idx) => {
            const parts = line.split(';');
            if (parts.length < 10) return;
            const row = {
                song: parts[0].trim(),
                album: parts[1].trim(),
                word: parts[2].trim(),
                lemma: parts[3].trim(),
                pos: parts[4].trim(),
                case: parts[5].trim(),
                num: parts[6].trim(),
                tense: parts[7].trim(),
                person: parts[8].trim(),
                adj: parts[9].trim(),
                idx: idx
            };
            corpus.push(row);
            if (row.album && row.album !== '-') albumsList.add(row.album);
        });
        populateAlbumSelect();
        populateGrammarCheckboxes();
    }

    function populateAlbumSelect() {
        const select = document.getElementById('album-select');
        while (select.options.length > 1) select.remove(1);
        Array.from(albumsList).sort().forEach(album => {
            const opt = document.createElement('option');
            opt.value = album;
            opt.textContent = album;
            select.add(opt);
        });
    }

    function populateGrammarCheckboxes() {
        const grid = document.getElementById('grammarGrid');
        grid.innerHTML = '';
        grammarColumns.forEach(col => {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'grammar-group';
            const h4 = document.createElement('h4');
            h4.textContent = col.label;
            groupDiv.appendChild(h4);
            const values = new Set();
            corpus.forEach(r => {
                const val = r[col.index === 4 ? 'pos' : col.index === 5 ? 'case' : col.index === 6 ? 'num' : col.index === 7 ? 'tense' : col.index === 8 ? 'person' : 'adj'];
                if (val && val !== '-') values.add(val);
            });
            const sortedVals = Array.from(values).sort();
            if (sortedVals.length === 0) {
                const span = document.createElement('span');
                span.textContent = 'нет данных';
                span.style.color = '#94a3b8';
                groupDiv.appendChild(span);
            } else {
                sortedVals.forEach(val => {
                    const label = document.createElement('label');
                    label.className = 'checkbox-label';
                    label.innerHTML = `<input type="checkbox" name="${col.index}" value="${val}"> ${val}`;
                    groupDiv.appendChild(label);
                });
            }
            grid.appendChild(groupDiv);
        });
    }

    document.getElementById('grammarToggle').addEventListener('click', function() {
        const panel = document.getElementById('grammarPanel');
        const arrow = document.getElementById('arrow');
        const isOpen = panel.classList.contains('show');
        if (isOpen) {
            panel.classList.remove('show');
            this.classList.remove('active');
            arrow.textContent = '▼';
        } else {
            panel.classList.add('show');
            this.classList.add('active');
            arrow.textContent = '▲';
        }
    });

    document.getElementById('btnSearch').addEventListener('click', performSearch);
    document.getElementById('btnReset').addEventListener('click', () => {
        document.getElementById('f_word').value = '';
        document.getElementById('f_lemma').value = '';
        document.getElementById('album-select').value = '';
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
        document.getElementById('resultsArea').innerHTML = '';
        document.getElementById('statusBar').style.display = 'block';
    });

    function performSearch() {
        const f_word = document.getElementById('f_word').value.trim().toLowerCase();
        const f_lemma = document.getElementById('f_lemma').value.trim().toLowerCase();
        const selectedAlbum = document.getElementById('album-select').value;
        const selectedFilters = {};
        document.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
            if (!selectedFilters[cb.name]) selectedFilters[cb.name] = new Set();
            selectedFilters[cb.name].add(cb.value);
        });
        const matches = corpus.filter(r => {
            if (selectedAlbum && r.album !== selectedAlbum) return false;
            if (f_word && r.word.toLowerCase() !== f_word) return false;
            if (f_lemma && r.lemma.toLowerCase() !== f_lemma) return false;
            for (const colIdx in selectedFilters) {
                const val = r[colIdx === '4' ? 'pos' : colIdx === '5' ? 'case' : colIdx === '6' ? 'num' : colIdx === '7' ? 'tense' : colIdx === '8' ? 'person' : 'adj'];
                if (!selectedFilters[colIdx].has(val)) return false;
            }
            return true;
        }).map(r => r.idx);
        renderResults(matches);
    }

    function getContext(matchIdx) {
        const match = corpus[matchIdx];
        let left = [], right = [];
        for (let i = 1; i <= 3; i++) {
            const p = matchIdx - i;
            if (p >= 0 && corpus[p].song === match.song) left.unshift(corpus[p].word);
        }
        for (let i = 1; i <= 3; i++) {
            const n = matchIdx + i;
            if (n < corpus.length && corpus[n].song === match.song) right.push(corpus[n].word);
        }
        return { left, right, matchWord: match.word };
    }

    function renderResults(indices) {
        const area = document.getElementById('resultsArea');
        area.innerHTML = '';
        if (indices.length === 0) {
            area.innerHTML = '<div class="empty-state">Ничего не найдено. Попробуйте изменить параметры.</div>';
            return;
        }
        const LIMIT = 500;
        const shown = indices.slice(0, LIMIT);
        const stats = document.createElement('div');
        stats.className = 'stats';
        stats.textContent = `Найдено совпадений: ${indices.length}` + (indices.length > LIMIT ? ` (показаны первые ${LIMIT})` : '');
        area.appendChild(stats);
        const table = document.createElement('table');
        table.className = 'results-table';
        table.innerHTML = `<thead><tr><th style="width:30%">Песня / Альбом</th><th>Контекст (KWIC)</th></tr></thead><tbody></tbody>`;
        const tbody = table.querySelector('tbody');
        shown.forEach(idx => {
            const row = corpus[idx];
            const ctx = getContext(idx);
            const contextHTML = [...ctx.left, `<span class="match">${ctx.matchWord}</span>`, ...ctx.right].join(' ');
            const tr = document.createElement('tr');
            tr.innerHTML = `<td><div class="song-title">${row.song}</div><div class="song-album">${row.album}</div></td><td class="context-cell">${contextHTML}</td>`;
            tbody.appendChild(tr);
        });
        area.appendChild(table);
    }
</script>

</body>
</html>
